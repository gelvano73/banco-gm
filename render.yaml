# Blueprint Render — G&M Bank
# Docs: https://render.com/docs/blueprint-spec
#
# Após o deploy:
# 1. Copie a URL da API (ex.: https://gm-bank-api.onrender.com)
# 2. Em gm-bank-web → Environment → VITE_API_URL = essa URL → Clear build cache & deploy
# 3. Em gm-bank-api → FRONTEND_URL = URL do front (ex.: https://gm-bank-web.onrender.com)

services:
  - type: web
    name: gm-bank-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: gm-bank-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
